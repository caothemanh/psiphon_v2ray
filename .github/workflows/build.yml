name: Build Psiphon+V2Ray AAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      android_min_sdk:
        description: 'Android min SDK'
        default: '21'
        required: false

jobs:
  build-aar:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go 1.21
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"
          echo "NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: gomobile init
        run: gomobile init
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.NDK_HOME }}

      - name: Download dependencies
        run: |
          go mod download
          go mod tidy

      - name: Apply Xray-core patches
        run: |
          if [ -f "patches/patch_xray.py" ]; then
            python3 patches/patch_xray.py
          fi

      - name: Build AAR
        run: |
          gomobile bind \
            -target=android/arm,android/arm64 \
            -androidapi ${{ github.event.inputs.android_min_sdk || '21' }} \
            -o psiphon_v2ray.aar \
            -v \
            github.com/caothemanh/psiphon_v2ray/psiphon_v2ray
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.NDK_HOME }}
          GOFLAGS: "-mod=mod"
          CGO_ENABLED: "1"

      - name: Verify AAR contents
        run: |
          echo "=== AAR size ==="
          ls -lh psiphon_v2ray.aar
          echo "=== AAR contents ==="
          unzip -l psiphon_v2ray.aar
          echo "=== Java classes ==="
          unzip -p psiphon_v2ray.aar classes.jar | python3 -c "
          import zipfile, io, sys
          with zipfile.ZipFile(io.BytesIO(sys.stdin.buffer.read())) as z:
              for n in sorted(z.namelist()):
                  if n.endswith('.class'):
                      print(n)
          "

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: psiphon_v2ray-aar
          path: |
            psiphon_v2ray.aar
            psiphon_v2ray-sources.jar
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            psiphon_v2ray.aar
            psiphon_v2ray-sources.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
