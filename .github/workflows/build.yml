name: Build Psiphon+V2Ray AAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-aar:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go 1.21
        uses: actions/setup-go@v5
        with:
          go-version: '1.21.13'
          cache: false

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Install gomobile
        run: |
          GOFLAGS="" go install golang.org/x/mobile/cmd/gomobile@latest
          GOFLAGS="" go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Configure git and Go env
        run: |
          git config --global url."https://github.com/".insteadOf "git://github.com/"
          go env -w GONOSUMDB="*"
          go env -w GOPROXY="direct"
          go env -w GOFLAGS="-mod=mod"

      - name: Get Psiphon exact go.mod
        run: |
          git clone --depth=1 \
            https://github.com/Psiphon-Labs/psiphon-tunnel-core.git \
            /tmp/psi
          echo "=== Psiphon go.mod ==="
          cat /tmp/psi/go.mod

      - name: Merge Psiphon replace directives
        run: |
          python3 << 'PYEOF'
          import re

          with open('/tmp/psi/go.mod') as f:
              psi_mod = f.read()

          with open('go.mod') as f:
              our_mod = f.read()

          replace_blocks = re.findall(r'replace\s*\((.*?)\)', psi_mod, re.DOTALL)
          single_replaces = re.findall(r'^replace\s+\S+\s+=>\s+\S+\s+\S+', psi_mod, re.MULTILINE)

          replaces = []
          for block in replace_blocks:
              for line in block.strip().splitlines():
                  line = line.strip()
                  if line and not line.startswith('//'):
                      replaces.append(f'\t{line}')
          for r in single_replaces:
              replaces.append(f'\t{r.replace("replace ", "")}')

          if replaces:
              replace_str = '\n'.join(replaces)
              print(f"Adding {len(replaces)} replace directives")
              our_mod = our_mod.rstrip() + f'\n\nreplace (\n{replace_str}\n)\n'

          with open('go.mod', 'w') as f:
              f.write(our_mod)

          print("=== Final go.mod ===")
          print(our_mod)
          PYEOF
      - name: Restore golang.org/x/mobile
        run: |
           GOFLAGS="" go get golang.org/x/mobile@latest
           GOFLAGS="" go get golang.org/x/mobile/cmd/gobind@latest
        env:
            GONOSUMDB: "*"
            GOPROXY: "direct"
      - name: Download dependencies
        run: |
          go mod download 2>&1 | tail -40 || true
          go mod tidy -e 2>&1 | tail -20 || true
        env:
          GONOSUMDB: "*"
          GOPROXY: "direct"
          GOFLAGS: "-mod=mod"

      - name: gomobile init
        run: gomobile init
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Build AAR
        run: |
          gomobile bind \
            -target=android/arm,android/arm64 \
            -androidapi 21 \
            -o psiphon_v2ray.aar \
            -v \
            github.com/caothemanh/psiphon_v2ray/psiphon_v2ray
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          GOFLAGS: "-mod=mod"
          CGO_ENABLED: "1"
          GONOSUMDB: "*"
          GOPROXY: "direct"

      - name: Verify AAR
        run: |
          ls -lh psiphon_v2ray.aar
          unzip -l psiphon_v2ray.aar

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: psiphon_v2ray-aar
          path: |
            psiphon_v2ray.aar
            psiphon_v2ray-sources.jar
          retention-days: 30
          
